name: CD - Deploy API

on:
  push:
    branches: [main]

jobs:
  # Primeiro roda os testes
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restaurar dependências
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Executar Testes
        run: dotnet test --no-build --configuration Release --verbosity normal

  # Só faz deploy se os testes passarem
  deploy:
    name: Deploy para VPS
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish da API
        run: |
          dotnet publish NuvPizza.API -c Release -o ./publish
          # Remove banco de dados local para não sobrescrever o de produção
          rm -f ./publish/*.db ./publish/*.db-shm ./publish/*.db-wal

      - name: Configurar chave SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via Rsync
        run: |
          rsync -avz --delete \
            --exclude 'app.db*' \
            --exclude 'credentials.json' \
            --exclude 'tokens/' \
            --exclude 'wwwroot/images/' \
            --exclude 'logs/' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./publish/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/root/nuvpizza

      - name: Configurar variáveis de ambiente e reiniciar
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            # Cria override do systemd com as variáveis de ambiente (secrets)
            mkdir -p /etc/systemd/system/nuvpizza.service.d
            cat > /etc/systemd/system/nuvpizza.service.d/env.conf << EOF
          [Service]
          Environment="MercadoPago__AccessToken=${{ secrets.MP_ACCESS_TOKEN }}"
          Environment="MercadoPago__UseSandbox=false"
          Environment="AdminSettings__Email=${{ secrets.ADMIN_EMAIL }}"
          Environment="AdminSettings__Password=${{ secrets.ADMIN_PASSWORD }}"
          Environment="Jwt__Key=${{ secrets.JWT_KEY }}"
          EOF
            systemctl daemon-reload
            systemctl restart nuvpizza && systemctl status nuvpizza --no-pager
          ENDSSH
